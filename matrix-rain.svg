<svg xmlns="http://www.w3.org/2000/svg" width="80" height="220" viewBox="0 0 80 220">
  <g font-family="'Courier New',Courier,monospace" font-size="14">

    <!-- Column 1 -->
    <g>
      <text x="8" y="0"  fill="#002200">1</text>
      <text x="8" y="14" fill="#003300">0</text>
      <text x="8" y="28" fill="#005500">1</text>
      <text x="8" y="42" fill="#007700">1</text>
      <text x="8" y="56" fill="#009900">0</text>
      <text x="8" y="70" fill="#00bb00">1</text>
      <text x="8" y="84" fill="#00dd00">0</text>
      <text x="8" y="98" fill="#00ff41">1</text>
      <animateTransform attributeName="transform" type="translate" from="0,-112" to="0,220" dur="2.6s" repeatCount="indefinite" begin="0s"/>
    </g>

    <!-- Column 2 -->
    <g>
      <text x="26" y="0"  fill="#002200">0</text>
      <text x="26" y="14" fill="#003300">1</text>
      <text x="26" y="28" fill="#005500">0</text>
      <text x="26" y="42" fill="#007700">0</text>
      <text x="26" y="56" fill="#009900">1</text>
      <text x="26" y="70" fill="#00bb00">0</text>
      <text x="26" y="84" fill="#00dd00">1</text>
      <text x="26" y="98" fill="#00ff41">0</text>
      <animateTransform attributeName="transform" type="translate" from="0,-112" to="0,220" dur="3.1s" repeatCount="indefinite" begin="-1.4s"/>
    </g>

    <!-- Column 3 -->
    <g>
      <text x="44" y="0"  fill="#002200">1</text>
      <text x="44" y="14" fill="#003300">1</text>
      <text x="44" y="28" fill="#005500">0</text>
      <text x="44" y="42" fill="#007700">1</text>
      <text x="44" y="56" fill="#009900">0</text>
      <text x="44" y="70" fill="#00bb00">0</text>
      <text x="44" y="84" fill="#00dd00">1</text>
      <text x="44" y="98" fill="#00ff41">1</text>
      <animateTransform attributeName="transform" type="translate" from="0,-112" to="0,220" dur="2.9s" repeatCount="indefinite" begin="-0.7s"/>
    </g>

    <!-- Column 4 -->
    <g>
      <text x="62" y="0"  fill="#002200">0</text>
      <text x="62" y="14" fill="#003300">0</text>
      <text x="62" y="28" fill="#005500">1</text>
      <text x="62" y="42" fill="#007700">0</text>
      <text x="62" y="56" fill="#009900">1</text>
      <text x="62" y="70" fill="#00bb00">1</text>
      <text x="62" y="84" fill="#00dd00">0</text>
      <text x="62" y="98" fill="#00ff41">0</text>
      <animateTransform attributeName="transform" type="translate" from="0,-112" to="0,220" dur="3.4s" repeatCount="indefinite" begin="-2.0s"/>
    </g>

